name: Bug report
description: Report a reproducible QuotaCompass problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve QuotaCompass. Remove tokens, cookies, account IDs, machine-specific paths, and raw provider responses before submitting. Security vulnerabilities belong in private reporting, not a public issue.
  - type: input
    id: version
    attributes:
      label: QuotaCompass version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - WSL
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected behavior and a minimal redacted reproduction.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Include relevant `quotacompass doctor --json` check IDs and hints, not credentials or raw provider payloads.
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, account identifiers, private paths, and raw provider responses.
          required: true
